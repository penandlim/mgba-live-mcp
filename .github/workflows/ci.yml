name: ci

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Restore cached open-source test ROM
        uses: actions/cache@v4
        with:
          path: roms/ucity.gbc
          key: ${{ runner.os }}-ucity-gbc-v1.3-9422ee2ca7b7ea1d46b58b2a429fff3f354dfd3e732dee1e7ae6220f148ce6e0
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Provision open-source test ROM
        run: uv run python -m mgba_live_mcp.test_rom fetch
      - name: Run checks
        run: make check
      - name: Build distributions
        run: uv build
      - name: Validate wheel contains packaged bridge script
        run: |
          uv run python - <<'PY'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifact found in dist/")

          target = "mgba_live_mcp/resources/mgba_live_bridge.lua"
          with zipfile.ZipFile(wheels[0]) as zf:
              names = set(zf.namelist())

          if target not in names:
              raise SystemExit(f"Missing required wheel resource: {target}")
          print(f"Validated wheel resource: {target}")
          PY
      - name: Generate coverage XML
        run: uv run coverage xml -o coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
